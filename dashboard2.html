<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☕ Cafe IoT Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-cafe: #f4f2ee;       /* สีเทาอมครีมอุ่นๆ สบายตา (Warm Gray) */
            --text-dark: #2c2523;     /* สีดำกาแฟเข้ม (Espresso Black) */
            --text-muted: #796f6a;    /* สีเทาหม่นอมน้ำตาล */
            --card-bg: #ffffff;       /* สีขาวนวลสำหรับกล่องข้อความ */
            --primary-brown: #8e7d73; /* สีน้ำตาลลาเต้ (Latte Brown) */
            --dark-brown: #5c4d46;    /* สีน้ำตาลเข้มโกโก้ */
            --status-on: #a3b899;     /* สีเขียวมัทฉะอ่อน สำหรับสถานะเปิด/ใช้งาน */
            --status-off: #d3c4be;    /* สีเทาน้ำตาลอ่อน สำหรับสถานะปิด */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-cafe);
            color: var(--text-dark);
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        header {
            margin-bottom: 2.5rem;
            text-align: center;
            border-bottom: 2px solid #e5dfd8;
            padding-bottom: 1.5rem;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--dark-brown);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 500;
            color: var(--dark-brown);
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(92, 77, 70, 0.04);
            border: 1px solid #eaddd5;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(92, 77, 70, 0.08);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .device-name {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-dark);
        }

        .pin-badge {
            font-size: 0.8rem;
            background-color: var(--bg-cafe);
            color: var(--text-muted);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }

        .card-body {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
        }

        .device-type {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 🎛️ ปุ่มสวิตช์เปิด-ปิดสไตล์คาเฟ่มินิมอล (Toggle Switch) */
        .switch {
            position: relative;
            display: inline-block;
            width: 55px;
            height: 28px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--status-off);
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        input:checked + .slider {
            background-color: var(--status-on);
        }

        input:checked + .slider:before {
            transform: translateX(27px);
        }

        /* สถานะสำหรับเซนเซอร์ (อ่านค่าอย่างเดียว) */
        .status-badge {
            font-weight: 500;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
        }

        .status-active {
            background-color: #dbe5d4;
            color: #5d7a4a;
        }

        .timestamp {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 2rem;
        }

        #loading {
            text-align: center;
            font-size: 1.2rem;
            color: var(--text-muted);
            padding: 3rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>☕ Cafe IoT Control Center</h1>
            <p>ระบบจัดการอุปกรณ์และเซนเซอร์ภายในร้านกาแฟ</p>
        </header>

        <div id="loading">กำลังเปิดร้านและดึงข้อมูลระบบ...</div>

        <div id="main-content" style="display: none;">
            <h2 class="section-title">🎛️ สวิตช์ควบคุมอุปกรณ์ (Actuators)</h2>
            <div class="grid-container" id="actuator-grid"></div>

            <h2 class="section-title">📊 เซนเซอร์วัดค่า (Sensors)</h2>
            <div class="grid-container" id="sensor-grid"></div>
            
            <div class="timestamp" id="update-time"></div>
        </div>
    </div>

    <script>
        // ตัวแปรเก็บข้อมูลภายในแอป
        let currentDevices = [];

        // ข้อมูลสำรอง (Fallback)
        const fallbackData = {"success":true,"count":5,"data":[{"id":"1","device_name":"LED1","device_type":"LED","pin":"13","status":"ON","created_at":"2026-06-30 10:16:41"},{"id":"2","device_name":"LED2","device_type":"LED","pin":"12","status":"OFF","created_at":"2026-06-30 10:16:41"},{"id":"3","device_name":"Temperature","device_type":"SENSOR","pin":"34","status":"ACTIVE","created_at":"2026-06-30 10:16:41"},{"id":"4","device_name":"Humidity","device_type":"SENSOR","pin":"35","status":"ACTIVE","created_at":"2026-06-30 10:16:41"},{"id":"5","device_name":"Soil Moisture","device_type":"SENSOR","pin":"36","status":"ACTIVE","created_at":"2026-06-30 10:16:41"}]};

        async function fetchDashboardData() {
            try {
                const response = await fetch('https://tc.sbtc-mng.com/api.php');
                if (!response.ok) throw new Error('Network error');
                const result = await response.json();
                currentDevices = result.data;
                renderDashboard(currentDevices);
            } catch (error) {
                console.warn("ใช้ข้อมูลจำลองเนื่องจากติด CORS หรือปัญหาเครือข่าย");
                currentDevices = fallbackData.data;
                renderDashboard(currentDevices);
            }
        }

        function renderDashboard(devices) {
            const actuatorGrid = document.getElementById('actuator-grid');
            const sensorGrid = document.getElementById('sensor-grid');
            
            actuatorGrid.innerHTML = '';
            sensorGrid.innerHTML = '';

            devices.forEach(device => {
                let controlElement = '';

                // ถ้าเป็น LED ให้แสดงเป็นปุ่มสวิตช์สลับเปิด-ปิดได้
                if (device.device_type === 'LED') {
                    const isChecked = device.status === 'ON' ? 'checked' : '';
                    controlElement = `
                        <label class="switch">
                            <input type="checkbox" ${isChecked} onchange="toggleDevice('${device.id}', this.checked)">
                            <span class="slider"></span>
                        </label>
                    `;
                } else {
                    // ถ้าเป็น Sensor ให้แสดงป้ายสถานะเฉยๆ
                    controlElement = `<span class="status-badge status-active">✓ ทำงานปกติ</span>`;
                }

                const cardHtml = `
                    <div class="card">
                        <div class="card-header">
                            <span class="device-name">${device.device_name}</span>
                            <span class="pin-badge">Pin: ${device.pin}</span>
                        </div>
                        <div class="card-body">
                            <span class="device-type">${device.device_type}</span>
                            ${controlElement}
                        </div>
                    </div>
                `;

                if (device.device_type === 'LED') {
                    actuatorGrid.innerHTML += cardHtml;
                } else {
                    sensorGrid.innerHTML += cardHtml;
                }
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            if(devices.length > 0) {
                document.getElementById('update-time').innerText = `อัปเดตล่าสุดเมื่อ: ${devices[0].created_at}`;
            }
        }

        // 🟢 ฟังก์ชันตอนกดปุ่มเปิด-ปิดสวิตช์
        async function toggleDevice(id, isChecked) {
            const newStatus = isChecked ? 'ON' : 'OFF';
            console.log(`📡กำลังส่งคำสั่งเปลี่ยน Device ID: ${id} ให้เป็นสถานะ: ${newStatus}`);

            // อัปเดตสถานะในตัวแปรหลักทันทีเพื่อให้ลื่นไหลชวนมอง
            const device = currentDevices.find(d => d.id === id);
            if (device) device.status = newStatus;

            try {
                // 🛠️ ส่วนเชื่อมต่อกับ API หลังบ้านจริงของคุณ:
                // คุณสามารถแก้ไข URL ด้านล่างนี้ตามโครงสร้าง API ที่อาจารย์หรือระบบของคุณกำหนดได้เลยครับ
                // เช่น: 'https://tc.sbtc-mng.com/api.php?set_id=' + id + '&status=' + newStatus
                
                const response = await fetch('https://tc.sbtc-mng.com/api.php', {
                    method: 'POST', // หรือ 'GET' ตามที่หลังบ้านกำหนด
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, status: newStatus })
                });
                
                if (!response.ok) throw new Error('ไม่สามารถส่งคำสั่งไปยังเซิร์ฟเวอร์ได้');
                console.log('✅ สั่งการสำเร็จ!');
            } catch (error) {
                console.error('❌ เชื่อมต่อ API จริงล้มเหลว (ระบบจะทำงานจำลองบนหน้าจอให้ก่อน):', error);
            }
        }

        window.onload = fetchDashboardData;
    </script>
</body>
</html>
